<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

</head>
<body>

<div class="layout">
  <div class="main">
    <header class="navbar">
      <div class="nav-left">
        <button class="btn btn-toggle" aria-label="Toggle sidebar">☰</button>
        <div class="nav-title">National Health System</div>
      </div>
      <div class="nav-right">
        <div class="user-pill">Guest</div>
        <button class="btn secondary">Help</button>
      </div>
    </header>

    <main class="container">
      <div class="card" style="max-width:520px;margin:40px auto;">
        <h3>Welcome back</h3>
        <form id="loginForm" class="form" data-demo data-redirect="doctor/doctor-dashboard.html">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />
          </div>
          <div class="form-group">
            <button class="btn" type="submit">Login</button>
            <a class="btn secondary" href="register.html" style="margin-left:8px">Register</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script src="./js/app.js"></script>
</body>
</html>
