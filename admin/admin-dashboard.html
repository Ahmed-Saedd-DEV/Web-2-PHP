<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="logo">N</div><div>
      <div style="font-weight:700">NatHealth</div>
      <div class="muted" style="font-size:.85rem">Admin</div>
    </div></div>
    <nav>
      <a href="admin-dashboard.html" class="active">Dashboard</a>
      <a href="manage-users.html">Manage Users</a>
      <a href="add-user.html">Add User</a>
    </nav>
  </aside>

  <div class="main">
    <header class="navbar">
      <div class="nav-left">
        <button class="btn btn-toggle">☰</button>
        <div class="nav-title">National Health System</div>
      </div>
      <div class="nav-right">
        <button class="btn secondary" id="syncBtn">Sync</button>
        <button class="btn" id="newBtn">New</button>
      </div>
    </header>

    <main class="container">
      <section class="grid grid-3" style="margin-bottom:16px">
        <div class="card">
          <h3>Total Users</h3>
          <div class="stat-number">300</div>
          <div class="muted">All active accounts</div>
        </div>
        <div class="card">
          <h3>Doctors</h3>
          <div class="stat-number">50</div>
          <div class="muted">Licensed medical staff</div>
        </div>
        <div class="card">
          <h3>Patients</h3>
          <div class="stat-number">250</div>
          <div class="muted">Registered patients</div>
        </div>
      </section>

      <section class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h3>Recent Users</h3>
          <div style="max-width:360px;">
            <div class="form-group">
              <label>Search users...</label>
              <input id="searchAdmin" data-filter-for="usersTable" placeholder="Search by name or role" />
            </div>
          </div>
        </div>

        <table id="usersTable" class="table" style="margin-top:12px">
          <thead><tr><th>Name</th><th>Role</th><th>Joined</th><th></th></tr></thead>
          <tbody>
            <tr><td>Amina Kareem</td><td>Patient</td><td>2026-03-10</td><td><button class="btn secondary">View</button></td></tr>
            <tr><td>Dr. Bahir</td><td>Doctor</td><td>2026-01-20</td><td><button class="btn secondary">View</button></td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  document.getElementById('syncBtn')?.addEventListener('click', ()=> showToast('info','System sync in progress'));
  document.getElementById('newBtn')?.addEventListener('click', ()=> showToast('info','New action (demo)'));
</script>
</body>
</html>
