<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Add User</title>
	<link rel="stylesheet" href="../css/style.css">
	</head>
	<body>

	<div class="layout">
		<aside class="sidebar">
			<div class="brand"><div class="logo">N</div><div>
				<div style="font-weight:700">NatHealth</div>
				<div class="muted" style="font-size:.85rem">Admin</div>
			</div></div>
			<nav>
				<a href="admin-dashboard.html">Dashboard</a>
				<a href="manage-users.html">Manage Users</a>
				<a href="add-user.html" class="active">Add User</a>
			</nav>
		</aside>

		<div class="main">
			<header class="navbar">
				<div class="nav-left">
					<button class="btn btn-toggle">☰</button>
					<div class="nav-title">National Health System</div>
				</div>
				<div class="nav-right">
					<div class="user-pill">Admin • NatHealth</div>
				</div>
			</header>

			<main class="container">
				<div class="card">
					<h3>Add New User</h3>
					<form id="addUserForm" class="form" data-demo data-redirect="manage-users.html">
						<div class="form-group">
							<label>Name</label>
							<input type="text" name="name" required />
						</div>
						<div class="form-group">
							<label>Email</label>
							<input type="email" name="email" required />
						</div>
						<div class="form-group">
							<label>Password</label>
							<input type="password" name="password" required />
						</div>
						<div class="form-group">
							<label>Role</label>
							<select name="role" required>
								<option value="">Select role</option>
								<option>Doctor</option>
								<option>Patient</option>
							</select>
						</div>
						<div class="form-group">
							<button class="btn" type="submit">Create User</button>
						</div>
					</form>
				</div>
			</main>
		</div>
	</div>

	<script src="../js/app.js"></script>

	</body>
	</html>
