<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Patient Dashboard</title>
		<link rel="stylesheet" href="../css/style.css">
		<!-- Page-scoped styles for the modern dashboard preview -->
		<style>
			body { font-family: 'Inter', sans-serif; background: #F8F9FA; margin: 0; }
			.layout { display: flex; min-height:100vh }
			/* Sidebar modern look */
			.sidebar { width:220px; background:var(--primary); color:#fff; padding:20px; }
			.sidebar nav a { display:block; color:#fff; padding:10px; border-radius:6px; margin-bottom:6px; text-decoration:none }
			.sidebar nav a.active, .sidebar nav a:hover{ background: rgba(255,255,255,0.12) }
			.navbar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#fff; border-bottom:1px solid var(--border) }
			.nav-right .user-name{ margin-right:8px; font-weight:600 }
			.nav-right .user-role{ margin-right:12px; color:var(--text-muted) }
			.card { background:#fff; padding:18px; border-radius:10px; box-shadow:0 6px 18px rgba(31,41,55,0.06) }
			.stat-card { text-align:center }
			.stat-number { font-size:28px; font-weight:700; color:var(--primary) }
			.grid { display:grid; gap:20px }
			.grid-2 { grid-template-columns:repeat(2,1fr) }
			.activity { padding:10px 0; border-bottom:1px solid #eee }
			.muted{ color:var(--text-muted); font-size:.9rem }
			@media(max-width:900px){ .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50} .layout{padding-left:0} }
		</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="logo">N</div><div>
      <div style="font-weight:700">NatHealth</div>
      <div class="muted" style="font-size:.85rem">Patient</div>
    </div></div>
    <nav>
      <a href="patient-dashboard.html" class="active">Dashboard</a>
      <a href="patient-records.html">My Records</a>
      <a href="patient-prescriptions.html">Prescriptions</a>
      <a href="profile.html">Profile</a>
    </nav>
  </aside>

  <div class="main">
    <header class="navbar">
      <div class="nav-left">
        <button class="btn btn-toggle">☰</button>
        <div class="nav-title">National Health System</div>
      </div>
      <div class="nav-right">
        <div class="user-pill">Ali • Patient</div>
        <button class="btn secondary">Logout</button>
      </div>
    </header>

    <main class="container">
      <div class="grid grid-2" style="margin-bottom:18px">
        <div class="card">
          <h3>Total Records</h3>
          <div class="stat-number">12</div>
        </div>
        <div class="card">
          <h3>Last Visit</h3>
          <div class="stat-number">10 Apr 2026</div>
        </div>
      </div>

      <div class="card">
        <h3>Recent Activity</h3>
        <div style="margin-top:8px">
          <div style="margin-bottom:10px"><strong>✔</strong> Blood test completed <div class="muted">April 10, 2026</div></div>
          <div><strong>✔</strong> Prescription added <div class="muted">April 8, 2026</div></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/app.js"></script>
</body>
</html>
