<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Profile</title>
	<link rel="stylesheet" href="../css/style.css">
	</head>
	<body>

	<div class="layout">
	  <aside class="sidebar">
	    <div class="brand"><div class="logo">N</div><div>
	      <div style="font-weight:700">NatHealth</div>
	      <div class="muted" style="font-size:.85rem">Patient</div>
	    </div></div>
	    <nav>
	      <a href="patient-dashboard.html">Dashboard</a>
	      <a href="patient-records.html">My Records</a>
	      <a href="patient-prescriptions.html">Prescriptions</a>
	      <a href="profile.html" class="active">Profile</a>
	    </nav>
	  </aside>

	  <div class="main">
	    <header class="navbar">
	      <div class="nav-left">
	        <button class="btn btn-toggle">☰</button>
	        <div class="nav-title">National Health System</div>
	      </div>
	      <div class="nav-right">
	        <div class="user-pill">Ali • Patient</div>
	        <button class="btn secondary">Logout</button>
	      </div>
	    </header>

	    <main class="container">
	      <div class="card">
	        <h3>Profile Settings</h3>
	        <form id="profileForm" class="form" data-demo>
	          <div class="form-group">
	            <label>Name</label>
	            <input type="text" name="name" value="Ali Hassan" required />
	          </div>
	          <div class="form-group">
	            <label>Email</label>
	            <input type="email" name="email" value="ali@mail.com" required />
	          </div>
	          <div class="form-group">
	            <label>Password</label>
	            <input type="password" name="password" />
	          </div>
	          <div class="form-group">
	            <button class="btn" type="submit">Update Profile</button>
	          </div>
	        </form>
	      </div>
	    </main>
	  </div>
	</div>

	<script src="../js/app.js"></script>
	</body>
	</html>
