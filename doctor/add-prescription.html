<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add Prescription</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="logo">N</div><div>
      <div style="font-weight:700">NatHealth</div>
      <div class="muted" style="font-size:.85rem">Doctor</div>
    </div></div>
    <nav>
      <a href="doctor-dashboard.html">Dashboard</a>
      <a href="doctor-patients.html">My Patients</a>
      <a href="add-prescription.html" class="active">Add Prescription</a>
    </nav>
  </aside>

  <div class="main">
    <header class="navbar">
      <div class="nav-left">
        <button class="btn btn-toggle">☰</button>
        <div class="nav-title">National Health System</div>
      </div>
      <div class="nav-right">
        <div class="user-pill">Dr. Ahmed • Doctor</div>
      </div>
    </header>

    <main class="container">
      <div class="card" style="max-width:680px;margin:36px auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3>Add Prescription</h3>
          <a href="doctor-patients.html" class="btn secondary">Back</a>
        </div>
        <form class="form" data-demo data-redirect="doctor/doctor-patients.html">
          <div class="form-group">
            <label>Patient</label>
            <input type="text" name="patient" required />
          </div>
          <div class="form-group">
            <label>Medication</label>
            <input type="text" name="medication" required />
          </div>
          <div class="form-group">
            <label>Dosage & Instructions</label>
            <textarea name="instructions"></textarea>
          </div>
          <div class="form-group">
            <button class="btn" type="submit">Prescribe</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script src="../js/app.js"></script>

</body>
</html>
