<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Edit Record</title>
	<link rel="stylesheet" href="../css/style.css">
	</head>
	<body>

	<div class="layout">
		<aside class="sidebar">
			<div class="brand"><div class="logo">N</div><div>
				<div style="font-weight:700">NatHealth</div>
				<div class="muted" style="font-size:.85rem">Doctor</div>
			</div></div>
			<nav>
				<a href="doctor-dashboard.html">Dashboard</a>
				<a href="doctor-patients.html">My Patients</a>
				<a href="edit-record.html" class="active">Edit Record</a>
			</nav>
		</aside>

		<div class="main">
			<header class="navbar">
				<div class="nav-left">
					<button class="btn btn-toggle">☰</button>
					<div class="nav-title">National Health System</div>
				</div>
				<div class="nav-right">
					<div class="user-pill">Dr. Ahmed • Doctor</div>
				</div>
			</header>

			<main class="container">
				<div class="card">
					<h3>Edit Medical Record</h3>
					<form id="editRecordForm" class="form" data-demo data-redirect="doctor/doctor-patients.html">
						<div class="form-group">
							<label>Patient</label>
							<select name="patient" required>
								<option value="">Select patient</option>
								<option selected>Ali Hassan</option>
								<option>Omar Mohamed</option>
							</select>
						</div>
						<div class="form-group">
							<label>Diagnosis</label>
							<textarea name="diagnosis" required>Flu</textarea>
						</div>
						<div class="form-group">
							<label>Notes</label>
							<textarea name="notes">Patient recovering well</textarea>
						</div>
						<div class="form-group">
							<label>Date</label>
							<input type="date" name="date" value="2026-04-20" required />
						</div>
						<div class="form-group">
							<button class="btn" type="submit">Update Record</button>
						</div>
					</form>
				</div>
			</main>
		</div>
	</div>

	<script src="../js/app.js"></script>

	</body>
	</html>
